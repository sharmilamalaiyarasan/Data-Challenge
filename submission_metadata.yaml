# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid semantic ranking pipeline combining three similarity signals:
  Sentence Transformers (50%), BM25 Okapi (30%), and TF-IDF (20%) for
  robust job description matching beyond keyword overlap.

  Logical Consistency Validation: Profiles with impossible employment dates,
  overlapping full-time roles, expert-level skills with zero experience months,
  or graduation timeline violations receive a validity_score of 0.0, forcing
  their final score to zero regardless of semantic match.

  Five-component scoring: semantic_match, skills (proficiency × duration weighted),
  career_growth (title rank trajectory), founder_mindset (GitHub + startup DNA),
  and product_experience (product vs service company ratio). Weights adapt
  dynamically per Recruiter Persona (Startup Founder vs Enterprise Recruiter).

  Risk scoring subtracts penalties for long notice periods (>90 days), job
  hopping (avg tenure <18 months), and relocation friction. Confidence scores
  reflect profile completeness and verification signals.

  XAI output: Every candidate receives a structured JSON breakdown with 1–5 star
  ratings across six dimensions and a factual one-sentence CSV reasoning string.

  Runtime: <60s on CPU after first-run embedding cache is built.

